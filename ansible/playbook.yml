- name: Deploy to Tomcat
  hosts: web
  become: yes

  tasks:

    - name: Copy WAR file to Tomcat
      copy:
        src: "/var/snap/jenkins/5042/workspace/an1/target/Mavenwebapp.war"
        dest: "/opt/tomcat/webapps/Mavenwebapp.war"
        remote_src: no

    - name: Restart Tomcat
      shell: systemctl restart tomcat
